name: Gemini Auto-Fix

# Reusable workflow: automatically applies actionable diff suggestions posted by
# Gemini code-assist on pull request comments, commits the changes, and replies
# with a confirmation comment.
#
# Usage example (caller workflow):
#
#   on:
#     issue_comment:
#       types: [created, edited]
#
#   jobs:
#     auto-fix:
#       uses: JakeDot/jd-ai-review-action/.github/workflows/gemini-auto-fix.yml@main
#       permissions:
#         contents: write
#         pull-requests: write
#       with:
#         allowed_path_pattern: '^(src/[A-Za-z0-9._/-]+|package\.json)$'

on:
  workflow_call:
    inputs:
      allowed_path_pattern:
        description: >
          Regex pattern for file paths that are safe to auto-patch.
          Paths starting with '.github/' and paths containing '..' are always
          blocked regardless of this pattern.
        required: false
        type: string
        default: '^[A-Za-z0-9._/-]+$'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Apply Gemini Review Fixes
    runs-on: ubuntu-latest
    # Only run if comment is from gemini-code-assist on a PR
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'gemini-code-assist' &&
      github.event.comment.user.type == 'Bot' &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    steps:
      - name: Read PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            const isSameRepo = pr.head.repo.full_name === baseRepo;
            core.setOutput('safe_to_modify', isSameRepo ? 'true' : 'false');
            core.setOutput('head_ref', pr.head.ref);

            if (!isSameRepo) {
              core.warning(`Skipping auto-fix for fork PR: ${pr.head.repo.full_name}`);
            }

      - name: Checkout PR branch
        if: steps.pr.outputs.safe_to_modify == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Apply actionable diff suggestions
        if: steps.pr.outputs.safe_to_modify == 'true'
        id: apply
        uses: actions/github-script@v7
        env:
          ALLOWED_PATH_PATTERN: ${{ inputs.allowed_path_pattern }}
        with:
          script: |
            const comment = context.payload.comment.body;
            const { execSync } = require('child_process');
            const fs = require('fs');

            // Only auto-apply actionable diff blocks.
            const codeBlockRegex = /```diff\n([\s\S]*?)```/g;
            let match;
            const fixes = [];
            let appliedCount = 0;
            const allowedPathRegex = new RegExp(process.env.ALLOWED_PATH_PATTERN);

            while ((match = codeBlockRegex.exec(comment)) !== null) {
              fixes.push(match[1].trim());
            }

            if (fixes.length === 0) {
              console.log('No actionable diff blocks found in review comment');
              core.setOutput('applied_count', '0');
              return;
            }

            console.log(`Found ${fixes.length} actionable diff block(s)`);

            for (let i = 0; i < fixes.length; i++) {
              const patchText = fixes[i];
              const fileMatches = [...patchText.matchAll(/^[+-]{3}\s+[ab]\/([^\s]+)\s*$/gm)];
              const files = fileMatches.map((m) => m[1]).filter((f) => f !== '/dev/null');

              const hasUnsafePath = files.some((filePath) => {
                const normalized = filePath.replace(/\\/g, '/');
                return (
                  normalized.includes('..') ||
                  normalized.startsWith('.github/') ||
                  normalized.startsWith('/') ||
                  !allowedPathRegex.test(normalized)
                );
              });

              if (files.length === 0 || hasUnsafePath) {
                console.log(`Skipping unsafe diff block #${i + 1}`);
                continue;
              }

              const patchFile = `/tmp/gemini-suggestion-${i}.diff`;
              fs.writeFileSync(patchFile, `${patchText}\n`, 'utf8');
              try {
                execSync(`git apply --whitespace=fix "${patchFile}"`, { stdio: 'pipe' });
                appliedCount++;
              } catch (error) {
                console.log(`Skipping non-applicable diff block #${i + 1}: ${error.message}`);
              }
            }

            core.setOutput('applied_count', String(appliedCount));
            console.log(`Applied ${appliedCount} diff block(s)`);

      - name: Commit auto-fixes if changes were made
        if: steps.pr.outputs.safe_to_modify == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            try {
              // Check if there are changes
              const status = execSync('git status --porcelain', { encoding: 'utf-8' });

              if (!status) {
                console.log('No changes detected');
                return;
              }

              console.log('Changes detected:');
              console.log(status);

              // Stage and commit changes
              execSync('git config user.name "github-actions[bot]"');
              execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
              execSync('git add .');
              execSync('git commit -m "Apply Gemini code review suggestions"');
              execSync('git push');

              // Add comment about auto-fix
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Applied actionable Gemini diff suggestions and committed changes.'
              });
            } catch (error) {
              console.log('No changes to commit or error occurred:', error.message);
            }
